---
- name: Deploy Spring Boot in Docker
  hosts: all
  become: yes

  vars:
    app_dir: /opt/app
    app_port: 8080
    container_name: spring-app
    image_name: spring-app

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install apt dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - nginx
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable"
        state: present

    - name: Install Docker CE
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Reset SSH connection so group change takes effect
      meta: reset_connection

    - name: Start and enable nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Configure nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-available/default
        owner: root
        group: root
        mode: "0644"
        content: |
          server {
              listen 80 default_server;
              listen [::]:80 default_server;
              server_name _;
              location / {
                  proxy_pass http://127.0.0.1:8080;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_connect_timeout 60s;
                  proxy_read_timeout 60s;
              }
          }

    - name: Restart nginx
      service:
        name: nginx
        state: restarted

    - name: Install local DB if requested (postgres)
      block:
        - name: Install postgresql
          apt:
            name:
              - postgresql
              - postgresql-contrib
            state: present
            update_cache: yes

        - name: Start and enable postgresql
          systemd:
            name: postgresql
            state: started
            enabled: yes

        - name: Fix pg_hba.conf to use md5 auth
          shell: |
            HBA=$(find /etc/postgresql -name pg_hba.conf | head -1)
            sed -i 's/scram-sha-256/md5/g' $HBA
            systemctl reload postgresql
          become: yes

        - name: Create postgres database
          shell: |
            sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='{{ db_name }}'" | grep -q 1 || \
            sudo -u postgres psql -c "CREATE DATABASE {{ db_name }};"
          become: yes

        - name: Create postgres user
          shell: |
            sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='{{ db_username }}'" | grep -q 1 || \
            sudo -u postgres psql -c "CREATE USER {{ db_username }} WITH ENCRYPTED PASSWORD '{{ db_password }}';"
          become: yes

        - name: Grant privileges to postgres user
          shell: |
            sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ db_name }} TO {{ db_username }};"
          become: yes

      when: install_db | default('false') | string == 'true' and db_type | default('') == 'postgres'

    - name: Install local DB if requested (mysql)
      block:
        - name: Install mysql-server
          apt:
            name: mysql-server
            state: present
            update_cache: yes

        - name: Start and enable mysql
          systemd:
            name: mysql
            state: started
            enabled: yes

        - name: Create mysql database
          shell: |
            mysql -u root -e "CREATE DATABASE IF NOT EXISTS {{ db_name }};"
          become: yes

        - name: Create mysql user and grant privileges
          shell: |
            mysql -u root -e "CREATE USER IF NOT EXISTS '{{ db_username }}'@'localhost' IDENTIFIED BY '{{ db_password }}'; GRANT ALL ON {{ db_name }}.* TO '{{ db_username }}'@'localhost'; FLUSH PRIVILEGES;"
          become: yes

      when: install_db | default('false') | string == 'true' and db_type | default('') == 'mysql'

    - name: Install local DB if requested (mongodb)
      block:
        - name: Install gnupg and curl for MongoDB
          apt:
            name:
              - gnupg
              - curl
            state: present

        - name: Add MongoDB GPG key
          shell: |
            curl -fsSL https://pgp.mongodb.com/server-7.0.asc | gpg -o /usr/share/keyrings/mongodb-server-7.0.gpg --dearmor
          args:
            creates: /usr/share/keyrings/mongodb-server-7.0.gpg

        - name: Add MongoDB apt repository
          shell: |
            echo "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse" | tee /etc/apt/sources.list.d/mongodb-org-7.0.list

        - name: Install mongodb-org
          apt:
            name: mongodb-org
            state: present
            update_cache: yes

        - name: Start and enable mongod
          systemd:
            name: mongod
            state: started
            enabled: yes

        - name: Create mongodb database and init collection
          shell: |
            mongosh --eval 'db.getSiblingDB("{{ db_name }}").createCollection("init")'
          become: yes

      when: install_db | default('false') | string == 'true' and db_type | default('') == 'mongodb'

    - name: Wipe old app directory
      file:
        path: "{{ app_dir }}"
        state: absent
      ignore_errors: yes

    - name: Recreate app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    - name: Copy project files to server
      copy:
        src: ../
        dest: "{{ app_dir }}/"
        mode: "0755"

    - name: Copy JAR into app directory
      copy:
        src: "jar/{{ jar_name }}"
        dest: "{{ app_dir }}/app.jar"
        mode: "0644"

    - name: Write Dockerfile for Spring Boot
      copy:
        dest: "{{ app_dir }}/Dockerfile"
        owner: root
        group: root
        mode: "0644"
        content: |
          FROM eclipse-temurin:17-jre
          WORKDIR /app
          COPY app.jar app.jar
          EXPOSE 8080
          ENTRYPOINT ["java", "-jar", "app.jar"]

    - name: Stop existing container
      shell: docker stop {{ container_name }} || true
      become: yes

    - name: Remove existing container
      shell: docker rm {{ container_name }} || true
      become: yes

    - name: Remove old image to force rebuild
      shell: docker rmi {{ image_name }}:latest || true
      become: yes

    - name: Build Docker image
      shell: docker build --no-cache -t {{ image_name }}:latest {{ app_dir }}
      become: yes

    - name: Run Docker container
      shell: >
        docker run -d
        --name {{ container_name }}
        --network host
        --restart always
        {% if spring_datasource_url is defined and spring_datasource_url %}-e SPRING_DATASOURCE_URL='{{ spring_datasource_url }}'
        -e SPRING_DATASOURCE_USERNAME='{{ spring_datasource_username | default('') }}'
        -e SPRING_DATASOURCE_PASSWORD='{{ spring_datasource_password | default('') }}'{% endif %}
        {% if spring_data_mongodb_uri is defined and spring_data_mongodb_uri %}-e SPRING_DATA_MONGODB_URI='{{ spring_data_mongodb_uri }}'{% endif %}
        {% if spring_profiles_active is defined and spring_profiles_active %}-e SPRING_PROFILES_ACTIVE='{{ spring_profiles_active }}'{% endif %}
        {{ image_name }}:latest
      become: yes

    - name: Wait for Spring Boot to start on port 8080
      wait_for:
        host: 127.0.0.1
        port: "{{ app_port }}"
        delay: 15
        timeout: 120
        state: started
      ignore_errors: yes
      register: port_wait

    - name: Capture docker logs if startup failed
      command: docker logs --tail 100 {{ container_name }}
      register: service_logs
      when: port_wait is failed
      changed_when: false
      ignore_errors: yes

    - name: Show docker logs
      debug:
        msg: "{{ service_logs.stdout_lines | default(service_logs.stderr_lines) }}"
      when: port_wait is failed

    - name: Fail with clear message if app did not start
      fail:
        msg: "Spring Boot did not start on port 8080. See docker logs output above."
      when: port_wait is failed

    - name: Report server IP
      debug:
        msg: "server_ip={{ ansible_host }}"

    - name: Report deployment success
      debug:
        msg: "Spring Boot deployed successfully. Live at http://{{ ansible_host }}/"